<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>meowww</title>

<style>
body{
margin:0;
font-family:Arial;
background:#120018;
color:white;
}

header{
padding:15px;
background:#2a0033;
display:flex;
gap:10px;
flex-wrap:wrap;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:8px;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#b300ff;
color:white;
cursor:pointer;
}

.post{
background:#2a0033;
margin:15px;
padding:10px;
border-radius:12px;
}

.post img{
width:100%;
border-radius:10px;
margin-top:10px;
}

.like{
cursor:pointer;
color:#ff4df0;
margin-top:5px;
}

#supportBtn{
margin:10px 15px;
width:calc(100% - 30px);
}
</style>
</head>

<body>

<header>
<input id="imgUrl" placeholder="Вставь URL картинки...">
<input id="username" placeholder="Имя">
<button onclick="uploadPost()">Опубликовать</button>
</header>

<button id="supportBtn" onclick="openSupport()">❓ Есть вопросы? Напишите нам</button>

<div id="feed"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
query,
onSnapshot,
orderBy,
serverTimestamp,
doc,
updateDoc,
increment
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDaLvdIfjj-umESHuhV-6zOlEZLLoX-YaU",
  authDomain: "ffedd-c2a16.firebaseapp.com",
  projectId: "ffedd-c2a16",
  storageBucket: "ffedd-c2a16.firebasestorage.app",
  messagingSenderId: "507464670915",
  appId: "1:507464670915:web:20cc32be4d9f6968528c76",
  measurementId: "G-4TCSE810ES"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allPosts = [];

/* =====================
   📸 POST
===================== */
window.uploadPost = async function(){
const url = document.getElementById("imgUrl").value;
const user = document.getElementById("username").value;

if(!url || !user) return;

await addDoc(collection(db,"posts"),{
image:url,
user:user,
likes:0,
createdAt:serverTimestamp()
});

document.getElementById("imgUrl").value="";
};

/* =====================
   ❤️ LIKE
===================== */
window.likePost = async function(id){
await updateDoc(doc(db,"posts",id),{
likes: increment(1)
});
};

/* =====================
   📡 POSTS FEED
===================== */
const postsQuery = query(collection(db,"posts"),orderBy("createdAt","desc"));

onSnapshot(postsQuery,(snap)=>{
const feed = document.getElementById("feed");
feed.innerHTML="";
allPosts = [];

snap.forEach(docu=>{
const d = docu.data();
allPosts.push({id:docu.id,...d});

feed.innerHTML += `
<div class="post">
<b>${d.user}</b>
<img src="${d.image}"/>
<div class="like" onclick="likePost('${docu.id}')">
❤️ ${d.likes}
</div>
</div>
`;
});
});

/* =====================
   🔎 SEARCH
===================== */
window.searchPosts = function(text){
const feed = document.getElementById("feed");
feed.innerHTML="";

allPosts
.filter(p =>
p.user.toLowerCase().includes(text.toLowerCase()) ||
p.image.toLowerCase().includes(text.toLowerCase())
)
.forEach(p=>{
feed.innerHTML += `
<div class="post">
<b>${p.user}</b>
<img src="${p.image}"/>
<div class="like" onclick="likePost('${p.id}')">
❤️ ${p.likes}
</div>
</div>
`;
});
};

/* =====================
   ❓ SUPPORT FORM
===================== */
window.openSupport = function(){
const name = prompt("Ваше имя:");
const phone = prompt("Ваш номер телефона:");
const message = prompt("Ваш вопрос:");

if(!name || !phone){
alert("Введите имя и телефон");
return;
}

saveContact(name, phone, message);
};

async function saveContact(name, phone, message){
try{
await addDoc(collection(db,"contacts"),{
name,
phone,
message: message || "",
createdAt:serverTimestamp()
});

alert("Мы получили вашу заявку и скоро свяжемся с вами!");
}
catch(e){
alert("Ошибка: " + e.message);
}
}

/* =====================
   🔎 UI SEARCH BAR
===================== */
const searchBox = document.createElement("input");
searchBox.placeholder = "🔎 Поиск постов...";
searchBox.style.margin = "10px 15px";
searchBox.style.width = "calc(100% - 30px)";
searchBox.oninput = (e)=>searchPosts(e.target.value);

document.body.insertBefore(searchBox, document.getElementById("feed"));

</script>

</body>
</html>
